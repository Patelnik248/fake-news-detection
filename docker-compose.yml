# =============================================================
# docker-compose.yml — Member 3: Multi-Container Orchestration
# Services: flask-api, nginx, mlflow, jenkins, prometheus, grafana
# =============================================================

version: "3.9"

services:

  # ── 1. Flask API (Flask + Waitress) ──────────────────────────
  flask-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flask-api
    ports:
      - "5001:5001"
    volumes:
      - models-data:/app/models    # use named volume if needed or nothing since it's copied
      - logs-data:/app/logs        # persist logs
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - PORT=5001
    depends_on:
      - mlflow
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── 2. NGINX Reverse Proxy ────────────────────────────────────
  nginx:
    build: ./nginx
    container_name: nginx
    ports:
      - "80:80"
    depends_on:
      - flask-api
    networks:
      - app-network
    restart: unless-stopped

  # ── 3. MLflow Tracking Server ─────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: mlflow
    ports:
      - "5000:5000"
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --default-artifact-root /mlflow/artifacts
        --backend-store-uri sqlite:///mlflow/mlflow.db
    volumes:
      - mlflow-data:/mlflow
    networks:
      - app-network
    restart: unless-stopped

  # ── 4. Jenkins CI/CD Server (Custom Image with Docker) ──────────
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock   # allow Jenkins to run docker
      - .:/var/jenkins_home/project:ro              # mount project for local CI/CD
    environment:
      - JAVA_OPTS=-Dhudson.plugins.git.GitSCM.ALLOW_LOCAL_CHECKOUT=true
    networks:
      - app-network
    restart: unless-stopped

  # ── 5. Prometheus Metrics ─────────────────────────────────────
  prometheus:
    build: ./monitoring
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - app-network
    restart: unless-stopped

  # ── 6. Grafana Dashboard ──────────────────────────────────────
  grafana:
    build: ./monitoring/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_AUTH_ANONYMOUS_ENABLED=false
    depends_on:
      - prometheus
    networks:
      - app-network
    restart: unless-stopped

# ── Named volumes ─────────────────────────────────────────────
volumes:
  mlflow-data:
  jenkins-data:
  prometheus-data:
  grafana-data:
  models-data:
  logs-data:

# ── Shared network ────────────────────────────────────────────
networks:
  app-network:
    driver: bridge
